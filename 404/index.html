&quot;, &quot;Fira Sans&quot;, Avenir, &quot;Helvetica Neue&quot;, &quot;Lucida Grande&quot;, sans-serif;height:100vh;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center"><div><style>body { margin: 0 }</style><h1 style="display:inline-block;border-right:1px solid rgba(0, 0, 0,.3);margin:0;margin-right:20px;padding:10px 23px 10px 0;font-size:24px;font-weight:500;vertical-align:top">404</h1><div style="display:inline-block;text-align:left;line-height:49px;height:49px;vertical-align:middle"><h2 style="font-size:14px;font-weight:normal;line-height:inherit;margin:0;padding:0">This page could not be found<!-- -->.</h2></div></div></div></main><div class="ant-divider ant-divider-horizontal" role="separator"></div><footer class="ant-layout-footer" style="padding:0 24px 24px"></footer></section></section></section></section></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"body":"\u003ch1 id=\"the-digital-botanical-gardens-initiative-dendron-page\"\u003e\u003ca aria-hidden=\"true\" class=\"anchor-heading\" href=\"#the-digital-botanical-gardens-initiative-dendron-page\"\u003e\u003csvg aria-hidden=\"true\" viewBox=\"0 0 16 16\"\u003e\u003cuse xlink:href=\"#svg-link\"\u003e\u003c/use\u003e\u003c/svg\u003e\u003c/a\u003eThe Digital Botanical Gardens Initiative Dendron page\u003c/h1\u003e\n\u003ch1 id=\"overview\"\u003e\u003ca aria-hidden=\"true\" class=\"anchor-heading\" href=\"#overview\"\u003e\u003csvg aria-hidden=\"true\" viewBox=\"0 0 16 16\"\u003e\u003cuse xlink:href=\"#svg-link\"\u003e\u003c/use\u003e\u003c/svg\u003e\u003c/a\u003eOverview\u003c/h1\u003e\n\u003cp\u003eThe Digital Botanical Gardens Initiative (DBGI) ambitions to explore innovative solutions for the collection, management and sharing of digital information acquired on living botanical collections. A particular focus will be placed on the large scale characterization of the chemodiversity of living plants collections through mass spectrometric approaches. The acquired data will be structured, organized and connected with relevant metadata through semantic web technology. The gathered knowledge will then inform ecosystem functioning research and orient biodiversity conservation projects. The DBGI initially aims to take advantage of the readily available living collections of Swiss botanical gardens to establish robust and scalable biodiversity digitisation workflows. The ultimate goal is to apply these approaches in the field and at the global scale in wildlife ecosystems. \u003c/p\u003e\n\u003ch1 id=\"main-goals\"\u003e\u003ca aria-hidden=\"true\" class=\"anchor-heading\" href=\"#main-goals\"\u003e\u003csvg aria-hidden=\"true\" viewBox=\"0 0 16 16\"\u003e\u003cuse xlink:href=\"#svg-link\"\u003e\u003c/use\u003e\u003c/svg\u003e\u003c/a\u003eMain goals\u003c/h1\u003e\n\u003cp\u003eThe DBGI main goals are briefly summarized below :\u003c/p\u003e\n\u003cp\u003e\u003cimg src=\"/dendron-dbgi/assets/images/2022-06-18-17-13-23.png\"\u003e\u003c/p\u003e\n\u003ch1 id=\"an-open-science-project\"\u003e\u003ca aria-hidden=\"true\" class=\"anchor-heading\" href=\"#an-open-science-project\"\u003e\u003csvg aria-hidden=\"true\" viewBox=\"0 0 16 16\"\u003e\u003cuse xlink:href=\"#svg-link\"\u003e\u003c/use\u003e\u003c/svg\u003e\u003c/a\u003eAn Open Science project\u003c/h1\u003e\n\u003ch2 id=\"working-with-the-garage-door-up\"\u003e\u003ca aria-hidden=\"true\" class=\"anchor-heading\" href=\"#working-with-the-garage-door-up\"\u003e\u003csvg aria-hidden=\"true\" viewBox=\"0 0 16 16\"\u003e\u003cuse xlink:href=\"#svg-link\"\u003e\u003c/use\u003e\u003c/svg\u003e\u003c/a\u003eWorking with the garage door up\u003c/h2\u003e\n\u003cp\u003e\u003cimg src=\"/dendron-dbgi/assets/images/2022-06-18-17-47-56.png\"\u003e\u003c/p\u003e\n\u003cp\u003eA way of working briefly described by Andy Matuschak here \u003ca href=\"https://notes.andymatuschak.org/z21cgR9K3UcQ5a7yPsj2RUim3oM2TzdBByZu\"\u003ehttps://notes.andymatuschak.org/z21cgR9K3UcQ5a7yPsj2RUim3oM2TzdBByZu\u003c/a\u003e. \u003c/p\u003e\n\u003ch2 id=\"open-notebook-science\"\u003e\u003ca aria-hidden=\"true\" class=\"anchor-heading\" href=\"#open-notebook-science\"\u003e\u003csvg aria-hidden=\"true\" viewBox=\"0 0 16 16\"\u003e\u003cuse xlink:href=\"#svg-link\"\u003e\u003c/use\u003e\u003c/svg\u003e\u003c/a\u003eOpen Notebook Science\u003c/h2\u003e\n\u003cp\u003eIf we apply this \"working with the garage door up\" idea to a scientific research endeavor we understand it as respecting the core concepts of open-science. These are in fact the principles of Open Notebook Science \u003ca href=\"https://en.wikipedia.org/wiki/Open-notebook_science\"\u003ehttps://en.wikipedia.org/wiki/Open-notebook_science\u003c/a\u003e\u003c/p\u003e\n\u003cp\u003eFor the projects of the DBGI we will follow such approach in order to share early ideas and results but also the less shiny parts of the research projects.\nExpect to find strange ideas, badly formulated text and poorly written code. However if you have time and interest you should be able to participate at each step of the process. Hopefully this will lead to enhanced collaboration and participation. Maybe yes, maybe not. Let's make it a methodological experiment !\u003c/p\u003e\n\u003cp\u003eEach pages of this website are written in markdown and hosted on Github. You can edit them by clicking on the \"Click here to edit this page on Github !\" link at the bottom of the page.\u003c/p\u003e\n\u003chr\u003e\n\u003cstrong\u003eChildren\u003c/strong\u003e\n\u003col\u003e\n\u003cli\u003e\u003ca href=\"/dendron-dbgi/notes/dnx52v0s12k0dxspvb0xefp\"\u003eBachelor Work 2022\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/dendron-dbgi/notes/z1zl1fl62r0zie9azb8ejhm\"\u003eBiblio\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/dendron-dbgi/notes/Qi1Z0BWicJLYowGMW2l9r\"\u003eBuffer Dbgi\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/dendron-dbgi/notes/thh99ldubxjgwl801kldy84\"\u003e
